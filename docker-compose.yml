version: '3.9'
services:
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: marketplace
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
      - ./server/src/db/migrations:/docker-entrypoint-initdb.d
  server:
    build:
      context: ./server
    environment:
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DATABASE: "marketplace"
      JWT_SECRET: "change_me_in_production"
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      BASE_URL: "http://localhost:5173"
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - mongo
  client:
    build:
      context: ./web-client
    environment:
      VITE_API_URL: "http://localhost:8080"
    ports:
      - "5173:5173"
    depends_on:
      - server
volumes:
  mongodata:
